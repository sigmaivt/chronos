<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Хронос — Hi-fi V6</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #04040a;
    color: #f5f3ed;
    font-family: "DM Sans", system-ui, sans-serif;
    min-width: 1280px;
    overflow-x: hidden;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(245,243,237,0.18); }

  .back-link {
    position: fixed; bottom: 22px; left: 60px; z-index: 50;
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    color: rgba(245,243,237,0.45); letter-spacing: 2px;
    text-transform: uppercase; text-decoration: none;
    transition: color 200ms;
  }
  .back-link:hover { color: #f5f3ed; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<a class="back-link" href="Хронос — Wireframes.html">← к вайрфреймам</a>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="cube.jsx"></script>
<script type="text/babel" src="hifi-v6.jsx"></script>
<script type="text/babel" src="timeline-v6.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "epoch": "contemporary",
  "ready": [],
  "unfolded": false,
  "laneOrder": [
    "you",
    "places",
    "ideas",
    "inventions",
    "art",
    "contemporaries"
  ]
}/*EDITMODE-END*/;

const FACE_LIST = [
  { id: 'front',  label: 'Ты' },
  { id: 'top',    label: 'Идеи' },
  { id: 'right',  label: 'Современники' },
  { id: 'left',   label: 'Искусство' },
  { id: 'back',   label: 'Места' },
  { id: 'bottom', label: 'Изобретения' },
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const ready = new Set(t.ready || []);
  const toggleReady = (faceId) => {
    const next = new Set(ready);
    next.has(faceId) ? next.delete(faceId) : next.add(faceId);
    setTweak('ready', Array.from(next));
  };
  return (
    <>
      <HiFiHero t={t} setTweak={setTweak} toggleReady={toggleReady} />
      <TweaksPanel title="Tweaks">
        <TweakSection label="Готовность граней" />
        <TweakRow label="Грани">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            {FACE_LIST.map((f) => {
              const on = ready.has(f.id);
              return (
                <button
                  key={f.id}
                  type="button"
                  onClick={() => toggleReady(f.id)}
                  style={{
                    appearance: 'none', cursor: 'pointer',
                    padding: '6px 10px', textAlign: 'left',
                    background: on ? 'rgba(34, 211, 238, 0.18)' : 'transparent',
                    border: `1px solid ${on ? '#22d3ee' : 'rgba(255,255,255,0.16)'}`,
                    borderRadius: 6,
                    color: on ? '#fff' : 'rgba(255,255,255,0.7)',
                    fontFamily: 'inherit', fontSize: 12,
                    display: 'flex', alignItems: 'center', gap: 8,
                  }}
                >
                  <span style={{
                    width: 8, height: 8, borderRadius: '50%',
                    background: on ? '#22d3ee' : 'rgba(255,255,255,0.2)',
                  }} />
                  {f.label}
                </button>
              );
            })}
          </div>
        </TweakRow>
        <TweakToggle
          label="Развёрнуть в ленту"
          hint="куб → горизонтальная линия жизни"
          value={t.unfolded}
          onChange={(v) => setTweak('unfolded', v)}
        />
        <TweakSection label="Эпоха пользователя" />
        <TweakSelect
          label="Активная эпоха"
          hint="вычисляется из даты рождения; цвет ТЫ-линии и собранных граней"
          value={t.epoch}
          options={EPOCH_ORDER.map((id) => ({ value: id, label: EPOCHS[id].ru }))}
          onChange={(v) => setTweak('epoch', v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
